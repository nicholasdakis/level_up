name: Daily Database Backup

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3am UTC
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout level_up repo
        uses: actions/checkout@v4

      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: nicholasdakis/level-up-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/backup_db.py

      - name: Commit and push backup
        run: |
          cd backup-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Daily backup $(date -u '+%Y-%m-%d')"
          git push
