name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      # Step 3: Install Python dependencies from pyproject.toml
      - name: Install dependencies
        run: pip install ".[dev]"

      # Step 4: Run pytest on all tests in backend/tests/
      - name: Run tests
        run: pytest -v

  build-and-deploy:
    needs: test # only runs if tests pass
    runs-on: ubuntu-latest # The virtual machine used for CI

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # Step 2: Set up Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"

      # Step 3: Create firebase_options.dart from base64 secret
      # Used base64 because multi-line Dart files can break if echoed directly.
      - name: Create firebase_options.dart from secret
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: |
          mkdir -p lib  # Make sure lib folder exists
          # Decode the base64 secret and save as lib/firebase_options.dart
          # If the file already exists, it will be overwritten
          echo "$FIREBASE_OPTIONS" | base64 --decode > lib/firebase_options.dart

      # Step 4: Get dependencies
      - name: Install dependencies
        run: flutter pub get

      # Step 5: Build the web app
      - name: Build Flutter web
        run: flutter build web --release --base-href "/level_up/" --pwa-strategy=none

      # Step 6: Upload the build artifact for GitHub Pages
      - name: Upload build for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # Step 7: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
