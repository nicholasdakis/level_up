name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - run: flutter pub get

      - run: flutter build web --base-href "/level_up/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - uses: actions/deploy-pages@v4