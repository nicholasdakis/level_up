  <style>
    html {
      background: var(--notch-color, #2d2d2d);
      /* notch/status bar area matches appbar color */
      margin: 0;
      padding: 0;
      height: 100%;
      min-height: calc(100% + env(safe-area-inset-top));
    }

    body {
      background: var(--app-color, #2d2d2d);
      /* body uses the full gradient */
      margin: 0;
      padding: 0;
      height: 100%;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* splash screen overlay covers everything before flutter loads */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: var(--app-color, #2d2d2d);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      font-family: 'Manrope', sans-serif;
      /* Fade the whole splash in so it doesn't just pop in harshly */
      animation: splashFadeIn 0.4s ease forwards;
      /* lets flutter receive touches even during the fade out so UI is immediately responsive */
      pointer-events: none;
    }

    /* logo wrapper holds the glow effect behind the logo */
    #splash-logo-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      /* fade and scale up from slightly small */
      animation: logoReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    /* radial glow behind logo using a lighter version of the user's theme color */
    #splash-logo-wrapper::before {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent-color, #888) 22%, transparent) 0%, transparent 70%);
      /* pulsing glow so it feels alive, not static */
      animation: glowPulse 2.5s ease-in-out infinite;
    }

    #splash-logo {
      width: 160px;
      position: relative; /* sits on top of the ::before glow */
    }

    /* app name below the logo */
    #splash-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-bottom: 40px;
      color: color-mix(in srgb, var(--accent-color, #888) 85%, white);
      animation: fadeUp 0.6s ease 0.5s both;
    }

    /* wrapper for spinner + text so spacing is consistent */
    #splash-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      /* fade in last, after title */
      animation: fadeUp 0.6s ease 0.75s both;
    }

    #loading-text {
      color: color-mix(in srgb, var(--accent-color, #888) 70%, white);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* spinner loader */
    #loader {
      width: 36px;
      height: 36px;
      /* lighter version of the user's theme color */
      border: 3px solid var(--spinner-track, rgba(128,128,128,0.3));
      border-top: 3px solid var(--spinner-color, #888);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* infinite rotation animation */
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* whole splash fades in smoothly on load */
    @keyframes splashFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* logo scales up from 85% and fades in */
    @keyframes logoReveal {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* elements slide up slightly and fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* glow behind logo breathes in and out gently */
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.12); }
    }

  </style>

  <script>
    // Applies the gradient and notch color from a stored "dark|mid|notch" string
    // The gradient matches buildThemeGradient, the notch color matches the appbar (color.withAlpha(200) over dark)
    function applyAppColor(value) {

      var parts = value.split('|');
      var dark = parts[0], mid = parts[1], notch = parts[2] || dark;

      /* main gradient background used by splash and body */
      var gradient = 'linear-gradient(to right, ' + dark + ' 0%, ' + dark + ' 10%, ' + mid + ' 50%, ' + dark + ' 90%, ' + dark + ' 100%)';

      /* set css variables used by splash and body */
      document.documentElement.style.setProperty('--app-color', gradient);
      document.documentElement.style.setProperty('--spinner-color', mid);
      document.documentElement.style.setProperty('--spinner-track', 'rgba(128,128,128,0.3)');
      document.documentElement.style.setProperty('--notch-color', notch);
      /* mid color exposed as accent so spinner and glow use a lighter version of the theme color */
      document.documentElement.style.setProperty('--accent-color', mid);

      /* keep android status bar in sync with app theme */
      var meta = document.querySelector('meta[name="theme-color"]');
      if (!meta) {
        meta = document.createElement('meta');
        meta.name = 'theme-color';
        document.head.appendChild(meta);
      }
      meta.content = notch;
    }

    /* load saved theme before flutter boots so splash matches instantly */
    (function () {
      var saved = localStorage.getItem('appColor');
      if (saved) applyAppColor(saved);
    })();

    /* called from flutter when user changes theme */
    window.setAppColor = function (value) {
      localStorage.setItem('appColor', value);
      applyAppColor(value);
    };


</script>

  <!-- JS required by the pwa_install package, must be in <head> so it loads before Dart -->

  <script>

    /* stores install prompt event from browser */
    var deferredPrompt;

    // Capture the install prompt event when the browser fires it (Chrome/Edge only)
    window.addEventListener('beforeinstallprompt', (e) => {
      deferredPrompt = e;
    });

    // Called from Dart to show the browser's native install dialog
    window.promptInstall = function () {
      deferredPrompt.prompt();
    };

    // Fires when the user successfully installs the app
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      appInstalled(); // notify the pwa_install package
    });

    // Called from Dart on startup to detect how the app was launched (browser, PWA, or TWA)
    // The pwa_install package uses this to set installPromptEnabled
    window.getLaunchMode = function () {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (deferredPrompt) hasPrompt(); // tell Dart the install prompt is available
      if (document.referrer.startsWith('android-app://')) {
        appLaunchedAsTWA();
      } else if (navigator.standalone || isStandalone) {
        appLaunchedAsPWA(); // already installed and running as PWA
      } else {
        window.appLaunchedInBrowser(); // running in a normal browser tab
      }
    };

  </script>

  <script>

    /* pwa detection helpers used by dart side */
    window.isPwa = function () {
      var standalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true; // iOS support
      return standalone;
    }

    // Returns true if the browser supports the native install prompt (Chrome/Edge)
    window.supportsNativePrompt = function () {
      return 'BeforeInstallPromptEvent' in window;
    }

    // Returns true if the install prompt was captured (app is not yet installed)
    window.hasInstallPrompt = function () {
      return deferredPrompt != null;
    }

  </script>

  <!-- Unregister old Flutter-generated service workers to prevent them from
       serving stale cached assets alongside the current bootstrap -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        var unregistered = false;
        for (var reg of registrations) {
          var url = (reg.active || reg.installing || reg.waiting)?.scriptURL || '';

          /* keep firebase worker because it handles push notifications */
          if (!url.includes('firebase-messaging-sw')) {
            reg.unregister();
            unregistered = true;
          }
        }

        /* reload if we removed old flutter cache worker */
        if (unregistered) window.location.reload();
      });
    }
  </script>

  <!-- Restore route after 404 redirect -->
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var redirect = params.get('redirect');
      if (redirect) {
        history.replaceState(null, '', '/level_up' + redirect);
      }
    })();
  </script>

  </script>

        splash.style.transition = 'opacity 0.4s ease';
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 400);

  <script>

    window.getWebFcmToken = async function (vapidKeyParam) {

      if (Notification.permission !== 'granted') return null;

      try {

        var reg = window._swRegistration;

        if (!reg) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          reg = registrations.find(r =>
            (r.active || r.installing || r.waiting)?.scriptURL.includes('firebase-messaging-sw')
          );
        }

        if (!reg) {
          reg = await navigator.serviceWorker.register('firebase-messaging-sw.js', { scope: '/level_up/' });
        }

        var messaging = firebase.messaging();

        return await messaging.getToken({
          vapidKey: vapidKeyParam,
          serviceWorkerRegistration: reg
        });

      } catch (e) {
        console.error('getWebFcmToken error:', e);
        return null;
      }
    };

  </script>

  <script>

    /* foreground push handler */
    try {
      var messaging = firebase.messaging();

      messaging.onMessage(function (payload) {

        var title = payload.notification?.title || 'Level Up!';
        var body = payload.notification?.body || '';

        if (Notification.permission === 'granted') {
          new Notification(title, { body: body });
        }
      });
    } catch (e) {}

  </script>

  <script>

    /* reload app if user leaves it for too long */
    (function () {

      var hiddenAt = null;
      var RELOAD_AFTER_MS = 30 * 60 * 1000;

      document.addEventListener('visibilitychange', function () {

        if (document.visibilityState === 'hidden') {
          hiddenAt = Date.now();
        }

        if (document.visibilityState === 'visible') {
          if (hiddenAt && Date.now() - hiddenAt > RELOAD_AFTER_MS) {
            window.location.reload();
          }
          hiddenAt = null;
        }

      });

    })();

  </script>
