    html {
      background: var(--notch-color, #0d1b2a);
      /* notch/status bar area matches appbar color */
      margin: 0;

    body {

    #splash-screen {

    /* dot pulse loader */
    #loader {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    #loading-text {
      color: rgba(255, 255, 255, 0.35);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40%            { opacity: 1;    transform: scale(1.2); }
    }

    @keyframes splashFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes logoReveal {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  <script>
    // Applies the gradient and notch color from a stored "dark|mid|notch" string
    // The gradient matches buildThemeGradient, the notch color matches the appbar (color.withAlpha(200) over dark)
    function applyAppColor(value) {

      var parts = value.split('|');
      var dark = parts[0], mid = parts[1], notch = parts[2] || dark;

      /* main gradient background used by splash and body */
      var gradient = 'linear-gradient(to right, ' + dark + ' 0%, ' + dark + ' 10%, ' + mid + ' 50%, ' + dark + ' 90%, ' + dark + ' 100%)';

      /* set css variables used by splash and body */
      document.documentElement.style.setProperty('--app-color', gradient);
      document.documentElement.style.setProperty('--spinner-color', mid);
      document.documentElement.style.setProperty('--spinner-track', 'rgba(128,128,128,0.3)');
      document.documentElement.style.setProperty('--notch-color', notch);
      /* mid color exposed as accent so spinner and glow use a lighter version of the theme color */
      document.documentElement.style.setProperty('--accent-color', mid);

      /* keep android status bar in sync with app theme */
      var meta = document.querySelector('meta[name="theme-color"]');
      if (!meta) {
        meta = document.createElement('meta');
        meta.name = 'theme-color';
        document.head.appendChild(meta);
      }
      meta.content = notch;
    }

    /* load saved theme before flutter boots so splash matches instantly */
    (function () {
      var saved = localStorage.getItem('appColor');
      if (saved) applyAppColor(saved);
    })();


    /* called from flutter when user changes theme */
    window.setAppColor = function (value) {
      localStorage.setItem('appColor', value);
      applyAppColor(value);
    };


</script>

  <!-- JS required by the pwa_install package, must be in <head> so it loads before Dart -->

  <script>

    /* stores install prompt event from browser */
    var deferredPrompt;

    // Capture the install prompt event when the browser fires it (Chrome/Edge only)
    window.addEventListener('beforeinstallprompt', (e) => {
      deferredPrompt = e;
    });

    // Called from Dart to show the browser's native install dialog
    window.promptInstall = function () {
      deferredPrompt.prompt();
    };

    // Fires when the user successfully installs the app
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      appInstalled(); // notify the pwa_install package
    });

    // Called from Dart on startup to detect how the app was launched (browser, PWA, or TWA)
    // The pwa_install package uses this to set installPromptEnabled
    window.getLaunchMode = function () {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (deferredPrompt) hasPrompt(); // tell Dart the install prompt is available
      if (document.referrer.startsWith('android-app://')) {
        appLaunchedAsTWA();
      } else if (navigator.standalone || isStandalone) {
        appLaunchedAsPWA(); // already installed and running as PWA
      } else {
        window.appLaunchedInBrowser(); // running in a normal browser tab
      }
    };

  </script>

  <script>

    /* pwa detection helpers used by dart side */
    window.isPwa = function () {
      var standalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true; // iOS support
      return standalone;
    }

    // Returns true if the browser supports the native install prompt (Chrome/Edge)
    window.supportsNativePrompt = function () {
      return 'BeforeInstallPromptEvent' in window;
    }

    // Returns true if the install prompt was captured (app is not yet installed)
    window.hasInstallPrompt = function () {
      return deferredPrompt != null;
    }

  </script>

  <!-- Unregister old Flutter-generated service workers to prevent them from
       serving stale cached assets alongside the current bootstrap -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        var unregistered = false;
        for (var reg of registrations) {
          var url = (reg.active || reg.installing || reg.waiting)?.scriptURL || '';

          /* keep firebase worker because it handles push notifications */
          if (!url.includes('firebase-messaging-sw')) {
            reg.unregister();
            unregistered = true;
          }
        }

        /* reload if we removed old flutter cache worker */
        if (unregistered) window.location.reload();
      });
    }
  </script>

  <script>

    window.getWebFcmToken = async function (vapidKeyParam) {

      if (Notification.permission !== 'granted') return null;

      try {

        var reg = window._swRegistration;

        if (!reg) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          reg = registrations.find(r =>
            (r.active || r.installing || r.waiting)?.scriptURL.includes('firebase-messaging-sw')
          );
        }

        if (!reg) {
          reg = await navigator.serviceWorker.register('firebase-messaging-sw.js', { scope: '/level_up/' });
        }

        var messaging = firebase.messaging();

        return await messaging.getToken({
          vapidKey: vapidKeyParam,
          serviceWorkerRegistration: reg
        });

      } catch (e) {
        console.error('getWebFcmToken error:', e);
        return null;
      }
    };

  </script>

  <script>
    // Pipes visualViewport height into Flutter so dialogs shift up immediately
    // when the iOS PWA keyboard opens, before any typing happens.
    // Flutter registers window.onViewportHeightChanged as a callback.
    (function () {
      function notifyFlutter() {
        if (window.visualViewport && typeof window.onViewportHeightChanged === 'function') {
          window.onViewportHeightChanged(window.visualViewport.height);
        }
      }
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', notifyFlutter);
      }
    })();
