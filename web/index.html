  <!-- JS required by the pwa_install package, must be in <head> so it loads before Dart -->

  <script>
    // Stores the browser's install prompt event
    var deferredPrompt;

    // Capture the install prompt event when the browser fires it (Chrome/Edge only)
    window.addEventListener('beforeinstallprompt', (e) => {
      deferredPrompt = e;
    });

    // Called from Dart to show the browser's native install dialog
    window.promptInstall = function () {
      deferredPrompt.prompt();
    };

    // Fires when the user successfully installs the app
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      appInstalled(); // notify the pwa_install package
    });

    // Called from Dart on startup to detect how the app was launched (browser, PWA, or TWA)
    // The pwa_install package uses this to set installPromptEnabled
    window.getLaunchMode = function () {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (deferredPrompt) hasPrompt(); // tell Dart the install prompt is available
      if (document.referrer.startsWith('android-app://')) {
        appLaunchedAsTWA();
      } else if (navigator.standalone || isStandalone) {
        appLaunchedAsPWA(); // already installed and running as PWA
      } else {
        window.appLaunchedInBrowser(); // running in a normal browser tab
      }
    };
  </script>

  <script>
    // Returns true if the app is opened as a PWA
    window.isPwa = function () {
      var standalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true; // iOS support
      return standalone;
    }

    // Returns true if the browser supports the native install prompt (Chrome/Edge)
    window.supportsNativePrompt = function () {
      return 'BeforeInstallPromptEvent' in window;
    }

    // Returns true if the install prompt was captured (app is not yet installed)
    window.hasInstallPrompt = function () {
      return deferredPrompt != null;
    }
  </script>

<body>
  <!-- Load Flutter bootstrap (defines _flutter.loader, does NOT auto-call load()) -->
  <script src="flutter_bootstrap.js" defer></script>

  <script>
    window.addEventListener('load', function (ev) {
      // Flutter registers flutter_service_worker.js for caching/updates
      // firebase-messaging-sw.js is registered separately below so both SWs coexist
      _flutter.loader.load({
        serviceWorkerSettings: {
          serviceWorkerUrl: 'flutter_service_worker.js',
          timeout: 4000,
        },
        onEntrypointLoaded: async function (engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
        }
      });
    });
  </script>

  <!-- Register the Firebase Cloud Messaging service worker so the browser can receive push notifications in the background -->
  <script>
    // Required JS initialization so the 'firebase' object exists for getWebFcmToken
    firebase.initializeApp({
      apiKey: "AIzaSyDJGN1oGmrLRFnyJL3PMj2G_-hyJeKywnE",
      authDomain: "level-up-a3181.firebaseapp.com",
      projectId: "level-up-a3181",
      storageBucket: "level-up-a3181.firebasestorage.app",
      messagingSenderId: "722650087969",
      appId: "1:722650087969:web:2b812c5bb0a2c30bc8d960"
    });

    const vapidKey = "BHOUN3IilK1CAEVwa3wGYU-2Ne801epRrf881PxACR6ZD064wMMrMNH89OCxWm4ArfE7Mc4GJhiZOcd0nbsGPQ0";

    // Register firebase-messaging-sw.js separately, which handles FCM only
    // Flutter's default SW stays in control of caching/updates
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('firebase-messaging-sw.js', { scope: '/level_up/' })
        .then(function (registration) {
          console.log('FCM Service Worker registered with scope:', registration.scope);
          window._swRegistration = registration;
        })
        .catch(function (err) {
          console.log('FCM Service Worker registration failed:', err);
        });
    }

    // Called from Dart via JS interop to pass the SW registration to getToken() so Firebase can find the service worker on subdirectory deployments (e.g. GitHub Pages at /level_up/)
    window.getWebFcmToken = async function (vapidKeyParam) {
      // Only call getToken() if permission is already granted (prevents JS violation)
      if (Notification.permission !== 'granted') return null;
      try {
        var reg = window._swRegistration;
        if (!reg) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          reg = registrations.find(r =>
            (r.active || r.installing || r.waiting)?.scriptURL.includes('firebase-messaging-sw')
          );
        }
        if (!reg) {
          reg = await navigator.serviceWorker.register('firebase-messaging-sw.js', { scope: '/level_up/' });
        }
        var messaging = firebase.messaging();
        return await messaging.getToken({
          vapidKey: vapidKeyParam,
          serviceWorkerRegistration: reg
        });
      } catch (e) {
        console.error('getWebFcmToken error:', e);
        return null;
      }
    };

    // Handle foreground messages directly in JS since the Flutter SDK's onMessage
    // doesn't receive messages when the token was obtained via JS interop
    var messaging = firebase.messaging();
    messaging.onMessage(function (payload) {
      console.log('Foreground message received:', payload);
      var title = payload.notification?.title || 'Level Up! Reminder';
      var body = payload.notification?.body || payload.data?.body || '';
      if (Notification.permission === 'granted') {
        new Notification(title, { body: body, icon: '/level_up/favicon-512.png' });
      }
    });

    // Called from Dart via JS interop to request notification permissions from the browser
    window.jsRequestPermission = async function () {
      try {
        return await Notification.requestPermission();
      } catch (e) {
        console.error('Permission request error:', e);
        return 'denied';
      }
    };

  </script>

  <div id="update-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#2d2d2d; color:white; text-align:center; padding:16px; z-index:9999; font-family:sans-serif;">
    A new version is available.
    <button onclick="window.location.reload()" style="margin-left:12px; padding:8px 16px; background:white; color:#2d2d2d; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
      Update
    </button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      // Every time the user switches back to the tab, check if a new version of the app has been deployed
      // Flutter's SW embeds a unique hash on every build, so if the file changed, a new SW will install
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          navigator.serviceWorker.getRegistration().then((registration) => {
            if (registration) registration.update();
          });
        }
      });

      // Listen for Flutter's SW finding an update
      navigator.serviceWorker.getRegistration().then((registration) => {
        if (!registration) return;
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          newWorker.addEventListener('statechange', () => {
            // Only show banner for real updates, not first install
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              document.getElementById('update-banner').style.display = 'block';
            }
          });
        });
      });
    }
  </script>
